<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Signal Found</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1 class="logoTitle">
      SIGNAL<br>
      FOUND
    </h1>

    <div class="signalInstruction">
      // LOCATE AND EXTRACT ALL SIGNAL WORDS
    </div>

    <div class="terminalDetails">

      <div class="miniInfoBox">
        <span>Word Count:</span>
        <strong id="wordCount">0</strong>
      </div>

      <div class="miniHintBox">
        <span id="signalHint">Hint: waiting for signal.</span>
      </div>

      <div class="scanBox"></div>

    </div>

    <section id="wordSignalScreen" class="decoderPanel">
      <div id="wordGrid" class="wordGrid"></div>
    </section>

    <button id="newSignalBtn" onclick="loadWordSignal()">
      NEW SIGNAL
    </button>

    <h2 class="responseTitle">
      SYSTEM RESPONSE
    </h2>

    <section class="responseScreen">
      <div id="responseOutput">
        <span class="waitingCursor">...</span>
      </div>
    </section>

    <img
      src="android-chrome-512x512.png"
      class="ghostBrain"
      alt=""
    >

  </div>

  <audio id="signalSound" src="signal-complete.mp3" preload="auto"></audio>

  <script src="script.js"></script>

</body>

</html>
