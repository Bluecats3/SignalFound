




<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Signal Found</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="container">

    <h1 class="logoTitle">
      SIGNAL<br>
      FOUND
    </h1>




    <div class="signalInstruction">
      // LOCATE AND EXTRACT ALL SIGNAL WORDS
    </div>

    <div class="terminalDetails">

      <div class="miniLog">

        <div class="signalData">
          <span>Word Count:</span>
          <span id="wordCount">6</span>
        </div>

        <div class="signalData">
          <span id="signalHint">suspicious search detected</span>
        </div>

      </div>

      <div class="signalGraph">
        <div class="waveLine"></div>
      </div>

    </div>

    <section id="wordSignalScreen" class="decoderPanel">
      <div id="wordGrid" class="wordGrid"></div>
    </section>

    <button id="newSignalBtn" onclick="loadWordSignal()">
      NEW SIGNAL
    </button>

    <h2 class="responseTitle">
      SYSTEM RESPONSE
    </h2>

    <section class="responseScreen">
      <div id="responseOutput">
        <span class="waitingCursor">...</span>
      </div>
    </section>

    <div class="bottomStatus">
      <span>TRANSMISSION RESTORED</span>
      <span id="decodedPhrase">>>> WAITING FOR SIGNAL <<<</span>
      <span>ARCHIVE UPDATED</span>
    </div>

    <img
      src="android-chrome-512x512.png"
      class="ghostBrain"
      alt=""
    >

  </div>

 <audio id="signalSound" src="signal-complete.mp3" preload="auto"></audio>

  <script src="script.js"></script>

</body>

</html>
