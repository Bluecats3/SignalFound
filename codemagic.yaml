workflows:
  ios-build:
    name: SignalFound iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html style.css script.js manifest.json www/
          cp *.png www/ 2>/dev/null || true
          cp favicon.ico www/ 2>/dev/null || true

      - name: Sync Capacitor
        script: |
          npx capacitor sync ios

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive

    artifacts:
      - ios/App/build/App.xcarchive
